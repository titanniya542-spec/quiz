let currentChapter = null;
let currentMode = 'all';
let questions = [];
let currentIdx = 0;
let answers = {};
let score = {correct:0, wrong:0, total:0};

function init() {
  const nav = document.getElementById('chapterNav');
  Object.keys(DATA).forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.textContent = ch;
    btn.onclick = () => selectChapter(ch);
    nav.appendChild(btn);
  });
}

function selectChapter(ch) {
  currentChapter = ch;
  currentIdx = 0;
  answers = {};
  score = {correct:0, wrong:0, total:0};
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.textContent === ch));
  document.getElementById('chapterTitle').textContent = ch;
  loadQuestions();
}

function setMode(mode) {
  currentMode = mode;
  currentIdx = 0;
  answers = {};
  score = {correct:0, wrong:0, total:0};
  document.querySelectorAll('.mode-bar button').forEach((b, i) => {
    const modes = ['all','choice','tf','fill','essay'];
    b.classList.toggle('active', modes[i] === mode);
  });
  if (currentChapter) loadQuestions();
}

function loadQuestions() {
  const data = DATA[currentChapter];
  questions = [];
  const types = currentMode === 'all' ? ['choice','tf','fill','essay'] : [currentMode];
  types.forEach(t => {
    if (data[t]) {
      data[t].forEach((q, i) => questions.push({...q, type: t, idx: i}));
    }
  });
  if (questions.length === 0) {
    document.getElementById('quizArea').innerHTML = '<div class="card"><p>该章节没有此类型的题目</p></div>';
    return;
  }
  renderQuestion();
}

function getTypeLabel(type) {
  return {choice:'选择题', tf:'判断题', fill:'填空题', essay:'简答题'}[type];
}

function renderQuestion() {
  if (currentIdx >= questions.length) { showScore(); return; }
  const q = questions[currentIdx];
  const area = document.getElementById('quizArea');
  const key = currentIdx;
  const answered = answers[key] !== undefined;

  let html = `<div class="card">`;
  html += `<span class="q-tag">${getTypeLabel(q.type)} ${q.idx + 1}</span>`;
  html += `<div class="q-text">${q.q}</div>`;

  if (q.type === 'choice') {
    const letters = ['A','B','C','D'];
    html += `<div class="options">`;
    q.o.forEach((opt, i) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (i === q.a) cls += ' correct';
        else if (answers[key] === i && i !== q.a) cls += ' wrong';
      }
      html += `<div class="${cls}" onclick="answerChoice(${key},${i})"><span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'tf') {
    html += `<div class="tf-opts">`;
    let cT = 'tf-btn', cF = 'tf-btn';
    if (answered) {
      cT += ' disabled'; cF += ' disabled';
      if (q.a === true) cT += ' correct'; else cT += (answers[key] === true ? ' wrong' : '');
      if (q.a === false) cF += ' correct'; else cF += (answers[key] === false ? ' wrong' : '');
    }
    html += `<div class="${cT}" onclick="answerTF(${key},true)">✓ 正确</div>`;
    html += `<div class="${cF}" onclick="answerTF(${key},false)">✗ 错误</div>`;
    html += `</div>`;
  } else if (q.type === 'fill' || q.type === 'essay') {
    const revealed = answers[key] !== undefined;
    html += `<button class="reveal-btn ${revealed?'hidden':''}" onclick="revealAnswer(${key})">点击查看答案</button>`;
    html += `<div class="answer-box ${revealed?'show':''}">${q.a.replace(/\n/g,'<br>')}</div>`;
    html += `<div class="self-grade ${revealed?'show':''}">`;
    html += `<button class="yes" onclick="selfGrade(${key},true)">😊 记住了</button>`;
    html += `<button class="no" onclick="selfGrade(${key},false)">😅 没记住</button>`;
    html += `</div>`;
  }

  html += `</div>`;
  area.innerHTML = html;
  updateProgress();
  updateNav();
}

function answerChoice(key, idx) {
  if (answers[key] !== undefined) return;
  answers[key] = idx;
  const q = questions[key];
  if (idx === q.a) score.correct++; else score.wrong++;
  score.total++;
  renderQuestion();
}

function answerTF(key, val) {
  if (answers[key] !== undefined) return;
  answers[key] = val;
  const q = questions[key];
  if (val === q.a) score.correct++; else score.wrong++;
  score.total++;
  renderQuestion();
}

function revealAnswer(key) {
  answers[key] = 'revealed';
  renderQuestion();
}

function selfGrade(key, correct) {
  answers[key] = correct ? 'correct' : 'wrong';
  if (correct) score.correct++; else score.wrong++;
  score.total++;
  setTimeout(() => go(1), 300);
}

function go(dir) {
  currentIdx += dir;
  if (currentIdx < 0) currentIdx = 0;
  renderQuestion();
}

function updateProgress() {
  const pct = questions.length > 0 ? ((currentIdx) / questions.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${questions.length}`;
}

function updateNav() {
  document.getElementById('prevBtn').disabled = currentIdx <= 0;
  document.getElementById('nextBtn').textContent = currentIdx >= questions.length - 1 ? '查看成绩' : '下一题';
}

function showScore() {
  const pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
  let msg = '';
  if (pct >= 90) msg = '太厉害了！这门稳了 💪';
  else if (pct >= 70) msg = '不错，再刷一遍错题就完美了';
  else if (pct >= 50) msg = '加油，重点看看错的那些';
  else msg = '别灰心，多刷几遍就记住了';

  let wrongHtml = '';
  Object.keys(answers).forEach(k => {
    const q = questions[k];
    const a = answers[k];
    let isWrong = false;
    if (q.type === 'choice' && a !== q.a) isWrong = true;
    if (q.type === 'tf' && a !== q.a) isWrong = true;
    if (a === 'wrong') isWrong = true;
    if (isWrong) {
      const letters = ['A','B','C','D'];
      let correctAns = '';
      if (q.type === 'choice') correctAns = letters[q.a] + '. ' + q.o[q.a];
      else if (q.type === 'tf') correctAns = q.a ? '正确 ✓' : '错误 ✗';
      else correctAns = q.a;
      wrongHtml += `<div class="wrong-item"><div class="wi-q">[${getTypeLabel(q.type)}] ${q.q}</div><div class="wi-a">✅ 正确答案：${correctAns}</div></div>`;
    }
  });

  document.getElementById('quizArea').innerHTML = `
    <div class="card score-card">
      <div class="score-num">${pct}%</div>
      <div class="score-label">正确 ${score.correct} / 总共 ${score.total}</div>
      <div class="score-msg">${msg}</div>
      <button class="restart-btn" onclick="selectChapter('${currentChapter}')">重新刷题</button>
      ${wrongHtml ? `<div class="wrong-list"><h3 style="margin-bottom:10px;color:#c62828">❌ 错题回顾</h3>${wrongHtml}</div>` : ''}
    </div>`;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '已完成';
}

init();
selectChapter(Object.keys(DATA)[0]);
</script>
</body>
</html>
